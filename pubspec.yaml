name: swiftcomp
description: A cross-platform composite calculator developed with Flutter, based on SwiftComp, designed for engineers and researchers. Available on iOS, Android, and Web.
publish_to: none

version: 7.7.0+2026071102

environment:
  sdk: ">=3.3.0 <4.0.0"

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  domain:
    path: packages/domain
  data:
    path: packages/data
  infrastructure:
    path: packages/infrastructure
  ui_components:
    path: packages/ui_components

  composite_calculator: ^1.0.1
  cupertino_icons: ^1.0.9
  fl_chart: ^1.2.0
  app_tracking_transparency: ^2.0.7
  flutter_math_fork: ^0.7.4
  flutter_staggered_grid_view: ^0.7.0
  device_info_plus: ^12.4.0
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  share_plus: ^12.0.2
  linalg: ^0.4.0
  intl: ^0.20.2
  auto_size_text: ^3.0.0
  provider: ^6.1.5+1
  flutter_progress_hud: ^2.0.2
  file: ^7.0.1
  get_it: ^9.2.1
  flutter_dotenv: ^6.0.1
  flutter_secure_storage: ^10.3.1
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0
  cached_network_image: ^3.4.1
  file_picker: ^11.0.2
  path_provider: ^2.1.6
  linkedin_login: ^3.2.3
  gpt_markdown: ^1.1.7
  http: ^1.6.0
  font_awesome_flutter: ^11.0.0
  msal_auth: ^3.5.1
  image_picker: ^1.2.3
  speech_to_text: ^7.0.0
  flutter_native_splash: ^2.4.8
  uuid: ^4.5.3
  shared_preferences: ^2.5.5

# Pinned so Android build does not resolve old plugin releases that still
# reference removed v1 embedding APIs (PluginRegistry.Registrar).
dependency_overrides:
  url_launcher_android: ^6.3.29
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.11.0
  webview_flutter_wkwebview: ^3.24.5
  webview_flutter_platform_interface: ^2.15.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.0.17
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "images/app_icon.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  config:
    enable-swift-package-manager: false

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - images/
    - .env
    - msal_config.json

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
flutter_intl:
  enabled: true
